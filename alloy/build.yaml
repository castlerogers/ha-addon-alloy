# HA's add-on build config rejects @sha256 digests in build_from (the Supervisor
# validates it against a tag-only regex and silently falls back to its default
# Alpine base if it fails — which then breaks our apt-get). So pin the tag only.
# The Supervisor builds with --pull, so each rebuild already fetches the current
# bookworm base; no digest pin needed to stay fresh.
build_from:
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm
  aarch64: ghcr.io/home-assistant/aarch64-base-debian:bookworm
